name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test ./... -race
      - name: Benchmarks (smoke)
        run: go test -bench . -benchmem -benchtime=100x -run '^$' ./...
